<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIAO — Prise de rendez-vous</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07111f;--bg2:#0d1e30;--bg3:#132840;--blue:#1a6bdb;--accent:#38bdf8;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--white:#e8f4ff;--gray:#64748b;--border:#1a3550}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--white)}
.screen{display:none;min-height:100vh}
.screen.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.btn{background:var(--blue);color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer}
.btn-danger{background:rgba(239,68,68,.2);color:#fca5a5}
input,select{background:var(--bg3);border:1px solid var(--border);color:white;padding:8px 12px;border-radius:6px;width:100%}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.creneau{background:var(--bg2);border-left:4px solid var(--blue);padding:12px;margin-bottom:8px;border-radius:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;background:rgba(56,189,248,.2);color:var(--accent)}
</style>
</head>
<body>

<div id="loginScreen" class="screen active">
  <div style="max-width:400px;margin:50px auto;padding:20px">
    <h1>SIAO Prise de RDV</h1>
    <div style="margin:20px 0">
      <button onclick="showLoginPanel('siao')" id="tabSiao" style="background:var(--blue)">🏛 SIAO</button>
      <button onclick="showLoginPanel('struct')" id="tabStruct">🏠 Structure</button>
    </div>
    <div id="siaoPanel">
      <input type="password" id="siaoPwd" placeholder="Mot de passe SIAO" style="margin-bottom:10px">
      <button class="btn" onclick="loginSiao()">Se connecter</button>
    </div>
    <div id="structPanel" style="display:none">
      <select id="structSelect"></select>
      <input type="password" id="structCode" placeholder="Code d'accès" style="margin-top:10px">
      <button class="btn" onclick="loginStruct()" style="margin-top:10px">Se connecter</button>
    </div>
    <div id="errorMsg" style="color:#fca5a5;margin-top:10px"></div>
  </div>
</div>

<div id="adminScreen" class="screen">
  <div style="display:flex;min-height:100vh">
    <div style="width:200px;background:var(--bg2);padding:20px">
      <h3>SIAO Admin</h3>
      <hr style="margin:10px 0">
      <button onclick="showAdminPanel('dashboard')">📊 Dashboard</button>
      <button onclick="showAdminPanel('creneaux')">📅 Créneaux</button>
      <button onclick="showAdminPanel('structures')">🏢 Structures</button>
      <button onclick="showAdminPanel('reservations')">✅ Réservations</button>
      <button onclick="logout()" style="margin-top:50px;background:var(--red)">Déconnexion</button>
    </div>
    <div style="flex:1;padding:20px" id="adminContent"></div>
  </div>
</div>

<div id="structScreen" class="screen">
  <div style="display:flex;min-height:100vh">
    <div style="width:200px;background:var(--bg2);padding:20px">
      <h3 id="structName">Structure</h3>
      <hr style="margin:10px 0">
      <button onclick="showStructPanel('mesrdv')">📅 Mes RDV</button>
      <button onclick="showStructPanel('dispo')">🟢 Créneaux dispo</button>
      <button onclick="logout()" style="margin-top:50px">Déconnexion</button>
    </div>
    <div style="flex:1;padding:20px" id="structContent"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://elzhfqxysirwqzgihkve.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsemhmcXh5c2lyd3F6Z2loa3ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDkzMzMsImV4cCI6MjA4OTkyNTMzM30._nz3MIUxjmabyShRS2x8k5l7HSfIxsgv-Ct8-wQaL0Y';
const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

let structures = [], creneaux = [], currentUser = null;

async function loadData() {
  const { data: s } = await supabase.from('structures').select('*');
  const { data: c } = await supabase.from('creneaux').select('*');
  structures = s || [];
  creneaux = c || [];
  const select = document.getElementById('structSelect');
  if(select) select.innerHTML = '<option value="">Choisir</option>' + structures.map(s => `<option value="${s.id}">${s.nom}</option>`).join('');
}
loadData();

function showLoginPanel(type) {
  document.getElementById('siaoPanel').style.display = type === 'siao' ? 'block' : 'none';
  document.getElementById('structPanel').style.display = type === 'struct' ? 'block' : 'none';
  document.getElementById('tabSiao').style.background = type === 'siao' ? 'var(--blue)' : 'transparent';
  document.getElementById('tabStruct').style.background = type === 'struct' ? 'var(--blue)' : 'transparent';
}

async function loginSiao() {
  const pwd = document.getElementById('siaoPwd').value;
  if(pwd === 'siao2025') {
    currentUser = { role: 'admin' };
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('adminScreen').classList.add('active');
    showAdminPanel('dashboard');
  } else {
    document.getElementById('errorMsg').innerText = 'Mot de passe incorrect';
  }
}

async function loginStruct() {
  const id = document.getElementById('structSelect').value;
  const code = document.getElementById('structCode').value;
  const struct = structures.find(s => s.id == id);
  if(struct && struct.code === code) {
    currentUser = { role: 'struct', id: struct.id, name: struct.nom };
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('structScreen').classList.add('active');
    document.getElementById('structName').innerText = struct.nom;
    showStructPanel('mesrdv');
  } else {
    document.getElementById('errorMsg').innerText = 'Code incorrect';
  }
}

function logout() {
  currentUser = null;
  document.getElementById('adminScreen').classList.remove('active');
  document.getElementById('structScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
}

async function showAdminPanel(panel) {
  const container = document.getElementById('adminContent');
  if(panel === 'dashboard') {
    const libres = creneaux.filter(c => c.statut === 'libre').length;
    const reserves = creneaux.filter(c => c.statut === 'reserve').length;
    container.innerHTML = `
      <h2>Dashboard</h2>
      <div class="grid">
        <div class="card"><h3>${creneaux.length}</h3><p>Total créneaux</p></div>
        <div class="card"><h3>${libres}</h3><p>Disponibles</p></div>
        <div class="card"><h3>${reserves}</h3><p>Réservés</p></div>
        <div class="card"><h3>${structures.length}</h3><p>Structures</p></div>
      </div>
    `;
  }
  else if(panel === 'creneaux') {
    container.innerHTML = `
      <h2>Créneaux</h2>
      <button class="btn" onclick="openCreneauModal()">+ Nouveau créneau</button>
      <div id="creneauxList">${renderCreneaux()}</div>
    `;
  }
  else if(panel === 'structures') {
    container.innerHTML = `
      <h2>Structures</h2>
      <button class="btn" onclick="openStructureModal()">+ Nouvelle structure</button>
      <div>${structures.map(s => `<div class="card"><b>${s.nom}</b> (${s.type})<br>Code: ${s.code}<br><button onclick="deleteStructure(${s.id})">Supprimer</button></div>`).join('')}</div>
    `;
  }
  else if(panel === 'reservations') {
    const reserves = creneaux.filter(c => c.statut === 'reserve');
    container.innerHTML = `<h2>Réservations</h2>${reserves.map(c => `<div class="creneau"><b>${c.type}</b> - ${c.date} ${c.heure}<br>Réservé par: ${c.reserve_par_nom || '?'}<br><button onclick="cancelReservation(${c.id})">Annuler</button></div>`).join('') || '<p>Aucune réservation</p>'}`;
  }
}

async function showStructPanel(panel) {
  const container = document.getElementById('structContent');
  if(panel === 'mesrdv') {
    const mesRdv = creneaux.filter(c => c.reserve_par == currentUser.id);
    container.innerHTML = `<h2>Mes rendez-vous</h2>${mesRdv.map(c => `<div class="creneau"><b>${c.type}</b> - ${c.date} ${c.heure}<br><button onclick="cancelMyReservation(${c.id})">Annuler</button></div>`).join('') || '<p>Aucun rendez-vous</p>'}`;
  }
  else if(panel === 'dispo') {
    const dispo = creneaux.filter(c => c.statut === 'libre' && new Date(c.date) >= new Date());
    container.innerHTML = `<h2>Créneaux disponibles</h2>${dispo.map(c => `<div class="creneau"><b>${c.type}</b> - ${c.date} ${c.heure}<br><button onclick="openReservationModal(${c.id})">Réserver</button></div>`).join('') || '<p>Aucun créneau disponible</p>'}`;
  }
}

function renderCreneaux() {
  return creneaux.map(c => `<div class="creneau"><b>${c.type}</b> - ${c.date} ${c.heure} (${c.duree}min)<br><span class="badge">${c.statut}</span><br><button onclick="deleteCreneau(${c.id})">Supprimer</button></div>`).join('');
}

async function openCreneauModal() {
  const date = prompt('Date (YYYY-MM-DD):');
  const heure = prompt('Heure (HH:MM):');
  if(date && heure) {
    await supabase.from('creneaux').insert([{ date, heure, duree: 60, type: 'Réunion', modalite: 'Présentiel', statut: 'libre' }]);
    const { data: c } = await supabase.from('creneaux').select('*');
    creneaux = c;
    showAdminPanel('creneaux');
  }
}

async function deleteCreneau(id) {
  await supabase.from('creneaux').delete().eq('id', id);
  const { data: c } = await supabase.from('creneaux').select('*');
  creneaux = c;
  showAdminPanel('creneaux');
}

async function openStructureModal() {
  const nom = prompt('Nom de la structure:');
  const code = Math.random().toString(36).substring(2, 8).toUpperCase();
  if(nom) {
    await supabase.from('structures').insert([{ nom, code, type: 'CHRS' }]);
    const { data: s } = await supabase.from('structures').select('*');
    structures = s;
    showAdminPanel('structures');
  }
}

async function deleteStructure(id) {
  await supabase.from('structures').delete().eq('id', id);
  const { data: s } = await supabase.from('structures').select('*');
  structures = s;
  showAdminPanel('structures');
}

async function openReservationModal(creneauId) {
  const nom = prompt('Votre nom (prénom NOM):');
  if(nom) {
    await supabase.from('creneaux').update({ statut: 'reserve', reserve_par: currentUser.id, reserve_par_nom: nom }).eq('id', creneauId);
    const { data: c } = await supabase.from('creneaux').select('*');
    creneaux = c;
    showStructPanel('mesrdv');
  }
}

async function cancelReservation(id) {
  await supabase.from('creneaux').update({ statut: 'libre', reserve_par: null, reserve_par_nom: null }).eq('id', id);
  const { data: c } = await supabase.from('creneaux').select('*');
  creneaux = c;
  showAdminPanel('reservations');
}

async function cancelMyReservation(id) {
  await supabase.from('creneaux').update({ statut: 'libre', reserve_par: null, reserve_par_nom: null }).eq('id', id);
  const { data: c } = await supabase.from('creneaux').select('*');
  creneaux = c;
  showStructPanel('mesrdv');
}
</script>
</body>
</html>
