<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAO - Prise de rendez-vous</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #07111f;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #0d1e30;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1a3550;
        }
        button {
            background: #1a6bdb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #3b82f6;
        }
        input, select {
            background: #07111f;
            border: 1px solid #1a3550;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 5px 0;
            width: 100%;
        }
        .hidden {
            display: none;
        }
        .creneau {
            background: #0d1e30;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #1a6bdb;
            border-radius: 5px;
        }
        .badge {
            background: #1a6bdb;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }
        .flex {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .sidebar {
            width: 200px;
            background: #0d1e30;
            padding: 20px;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
        }
        .content {
            margin-left: 220px;
            padding: 20px;
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            .content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

<!-- ÉCRAN DE CONNEXION -->
<div id="loginScreen">
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <div class="card">
            <h1 style="text-align: center;">SIAO Prise de RDV</h1>
            <div style="display: flex; gap: 10px; margin: 20px 0;">
                <button id="btnSiao" onclick="showSiaoLogin()" style="flex: 1;">🏛 SIAO</button>
                <button id="btnStruct" onclick="showStructLogin()" style="flex: 1;">🏠 Structure</button>
            </div>
            
            <div id="siaoLogin">
                <input type="password" id="siaoPassword" placeholder="Mot de passe SIAO">
                <button onclick="loginSiao()" style="width: 100%; margin-top: 10px;">Se connecter</button>
            </div>
            
            <div id="structLogin" class="hidden">
                <select id="structSelect"></select>
                <input type="password" id="structCode" placeholder="Code d'accès">
                <button onclick="loginStructure()" style="width: 100%; margin-top: 10px;">Se connecter</button>
            </div>
            
            <div id="errorMsg" style="color: #ef4444; margin-top: 10px; text-align: center;"></div>
        </div>
    </div>
</div>

<!-- ÉCRAN ADMIN -->
<div id="adminScreen" class="hidden">
    <div class="sidebar">
        <h3>SIAO Admin</h3>
        <hr style="margin: 10px 0;">
        <button onclick="showDashboard()" style="width: 100%; margin: 5px 0;">📊 Dashboard</button>
        <button onclick="showCreneaux()" style="width: 100%; margin: 5px 0;">📅 Créneaux</button>
        <button onclick="showStructures()" style="width: 100%; margin: 5px 0;">🏢 Structures</button>
        <button onclick="showReservations()" style="width: 100%; margin: 5px 0;">✅ Réservations</button>
        <button onclick="logout()" style="width: 100%; margin-top: 20px; background: #ef4444;">Déconnexion</button>
    </div>
    <div class="content" id="adminContent"></div>
</div>

<!-- ÉCRAN STRUCTURE -->
<div id="structureScreen" class="hidden">
    <div class="sidebar">
        <h3 id="structName">Structure</h3>
        <hr style="margin: 10px 0;">
        <button onclick="showMesRdv()" style="width: 100%; margin: 5px 0;">📅 Mes RDV</button>
        <button onclick="showDisponibles()" style="width: 100%; margin: 5px 0;">🟢 Créneaux dispo</button>
        <button onclick="logout()" style="width: 100%; margin-top: 20px;">Déconnexion</button>
    </div>
    <div class="content" id="structureContent"></div>
</div>

<script>
// Configuration Supabase
const SUPABASE_URL = 'https://elzhfqxysirwqzgihkve.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsemhmcXh5c2lyd3F6Z2loa3ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDkzMzMsImV4cCI6MjA4OTkyNTMzM30._nz3MIUxjmabyShRS2x8k5l7HSfIxsgv-Ct8-wQaL0Y';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let structures = [];
let creneaux = [];
let currentUser = null;

// Chargement initial
async function chargerDonnees() {
    try {
        const { data: s } = await supabase.from('structures').select('*');
        const { data: c } = await supabase.from('creneaux').select('*');
        structures = s || [];
        creneaux = c || [];
        
        // Mettre à jour le select des structures
        const select = document.getElementById('structSelect');
        if (select) {
            select.innerHTML = '<option value="">Sélectionner une structure</option>' + 
                structures.map(s => `<option value="${s.id}">${s.nom}</option>`).join('');
        }
    } catch(e) {
        console.error('Erreur chargement:', e);
    }
}

// Affichage des écrans
function showSiaoLogin() {
    document.getElementById('siaoLogin').classList.remove('hidden');
    document.getElementById('structLogin').classList.add('hidden');
    document.getElementById('errorMsg').innerHTML = '';
}

function showStructLogin() {
    document.getElementById('siaoLogin').classList.add('hidden');
    document.getElementById('structLogin').classList.remove('hidden');
    document.getElementById('errorMsg').innerHTML = '';
}

// Connexion SIAO
async function loginSiao() {
    const pwd = document.getElementById('siaoPassword').value;
    if (pwd === 'siao2025') {
        currentUser = { role: 'admin' };
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('adminScreen').classList.remove('hidden');
        showDashboard();
    } else {
        document.getElementById('errorMsg').innerHTML = 'Mot de passe incorrect';
    }
}

// Connexion Structure
async function loginStructure() {
    const structId = document.getElementById('structSelect').value;
    const code = document.getElementById('structCode').value;
    
    const structure = structures.find(s => s.id == structId);
    if (structure && structure.code === code) {
        currentUser = { role: 'structure', id: structure.id, nom: structure.nom };
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('structureScreen').classList.remove('hidden');
        document.getElementById('structName').innerHTML = structure.nom;
        showMesRdv();
    } else {
        document.getElementById('errorMsg').innerHTML = 'Code incorrect';
    }
}

// Déconnexion
function logout() {
    currentUser = null;
    document.getElementById('adminScreen').classList.add('hidden');
    document.getElementById('structureScreen').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('siaoPassword').value = '';
    document.getElementById('structCode').value = '';
}

// Admin - Dashboard
function showDashboard() {
    const libres = creneaux.filter(c => c.statut === 'libre').length;
    const reserves = creneaux.filter(c => c.statut === 'reserve').length;
    document.getElementById('adminContent').innerHTML = `
        <h2>Dashboard</h2>
        <div class="flex">
            <div class="card" style="flex:1">
                <h3>${creneaux.length}</h3>
                <p>Total créneaux</p>
            </div>
            <div class="card" style="flex:1">
                <h3>${libres}</h3>
                <p>Disponibles</p>
            </div>
            <div class="card" style="flex:1">
                <h3>${reserves}</h3>
                <p>Réservés</p>
            </div>
            <div class="card" style="flex:1">
                <h3>${structures.length}</h3>
                <p>Structures</p>
            </div>
        </div>
    `;
}

// Admin - Créneaux
async function showCreneaux() {
    const content = `
        <h2>Gestion des créneaux</h2>
        <button onclick="ajouterCreneau()">+ Nouveau créneau</button>
        <div id="creneauxList">
            ${creneaux.map(c => `
                <div class="creneau">
                    <strong>${c.type || 'Réunion'}</strong> - ${c.date} à ${c.heure} (${c.duree || 60} min)<br>
                    <span class="badge">${c.statut}</span>
                    ${c.reserve_par_nom ? `<span class="badge">👤 ${c.reserve_par_nom}</span>` : ''}
                    <br><button onclick="supprimerCreneau(${c.id})" style="margin-top: 10px; background:#ef4444;">Supprimer</button>
                </div>
            `).join('') || '<p>Aucun créneau</p>'}
        </div>
    `;
    document.getElementById('adminContent').innerHTML = content;
}

async function ajouterCreneau() {
    const date = prompt("Date (YYYY-MM-DD) :");
    const heure = prompt("Heure (HH:MM) :");
    if (date && heure) {
        await supabase.from('creneaux').insert([{
            date: date,
            heure: heure,
            duree: 60,
            type: "Réunion",
            modalite: "Présentiel",
            statut: "libre"
        }]);
        const { data: c } = await supabase.from('creneaux').select('*');
        creneaux = c;
        showCreneaux();
    }
}

async function supprimerCreneau(id) {
    if (confirm('Supprimer ce créneau ?')) {
        await supabase.from('creneaux').delete().eq('id', id);
        const { data: c } = await supabase.from('creneaux').select('*');
        creneaux = c;
        showCreneaux();
    }
}

// Admin - Structures
async function showStructures() {
    const content = `
        <h2>Gestion des structures</h2>
        <button onclick="ajouterStructure()">+ Nouvelle structure</button>
        <div>
            ${structures.map(s => `
                <div class="card">
                    <strong>${s.nom}</strong><br>
                    Type: ${s.type || 'CHRS'}<br>
                    Code: <code>${s.code}</code><br>
                    <button onclick="supprimerStructure(${s.id})" style="background:#ef4444; margin-top:10px;">Supprimer</button>
                </div>
            `).join('') || '<p>Aucune structure</p>'}
        </div>
    `;
    document.getElementById('adminContent').innerHTML = content;
}

async function ajouterStructure() {
    const nom = prompt("Nom de la structure :");
    if (nom) {
        const code = Math.random().toString(36).substring(2, 8).toUpperCase();
        await supabase.from('structures').insert([{ nom: nom, code: code, type: "CHRS" }]);
        const { data: s } = await supabase.from('structures').select('*');
        structures = s;
        showStructures();
    }
}

async function supprimerStructure(id) {
    if (confirm('Supprimer cette structure ?')) {
        await supabase.from('structures').delete().eq('id', id);
        const { data: s } = await supabase.from('structures').select('*');
        structures = s;
        showStructures();
    }
}

// Admin - Réservations
function showReservations() {
    const reserves = creneaux.filter(c => c.statut === 'reserve');
    document.getElementById('adminContent').innerHTML = `
        <h2>Toutes les réservations</h2>
        ${reserves.map(r => `
            <div class="creneau">
                <strong>${r.type || 'Réunion'}</strong> - ${r.date} à ${r.heure}<br>
                Réservé par: ${r.reserve_par_nom || 'Anonyme'}<br>
                <button onclick="annulerReservation(${r.id})" style="background:#ef4444;">Annuler</button>
            </div>
        `).join('') || '<p>Aucune réservation</p>'}
    `;
}

async function annulerReservation(id) {
    if (confirm('Annuler cette réservation ?')) {
        await supabase.from('creneaux').update({ statut: 'libre', reserve_par: null, reserve_par_nom: null }).eq('id', id);
        const { data: c } = await supabase.from('creneaux').select('*');
        creneaux = c;
        showReservations();
    }
}

// Structure - Mes RDV
function showMesRdv() {
    const mesRdv = creneaux.filter(c => c.reserve_par == currentUser.id);
    document.getElementById('structureContent').innerHTML = `
        <h2>Mes rendez-vous</h2>
        ${mesRdv.map(r => `
            <div class="creneau">
                <strong>${r.type || 'Réunion'}</strong> - ${r.date} à ${r.heure}<br>
                Modalité: ${r.modalite || 'Présentiel'}<br>
                <button onclick="annulerMonRdv(${r.id})" style="background:#ef4444;">Annuler</button>
            </div>
        `).join('') || '<p>Aucun rendez-vous</p>'}
    `;
}

async function annulerMonRdv(id) {
    if (confirm('Annuler ce rendez-vous ?')) {
        await supabase.from('creneaux').update({ statut: 'libre', reserve_par: null, reserve_par_nom: null }).eq('id', id);
        const { data: c } = await supabase.from('creneaux').select('*');
        creneaux = c;
        showMesRdv();
    }
}

// Structure - Créneaux disponibles
function showDisponibles() {
    const dispo = creneaux.filter(c => c.statut === 'libre');
    document.getElementById('structureContent').innerHTML = `
        <h2>Créneaux disponibles</h2>
        ${dispo.map(d => `
            <div class="creneau">
                <strong>${d.type || 'Réunion'}</strong> - ${d.date} à ${d.heure} (${d.duree || 60} min)<br>
                Modalité: ${d.modalite || 'Présentiel'}<br>
                <button onclick="reserverCreneau(${d.id})">Réserver</button>
            </div>
        `).join('') || '<p>Aucun créneau disponible</p>'}
    `;
}

async function reserverCreneau(id) {
    const nom = prompt("Votre nom (prénom NOM) :");
    if (nom) {
        await supabase.from('creneaux').update({ 
            statut: 'reserve', 
            reserve_par: currentUser.id, 
            reserve_par_nom: nom 
        }).eq('id', id);
        const { data: c } = await supabase.from('creneaux').select('*');
        creneaux = c;
        showMesRdv();
    }
}

// Initialisation
chargerDonnees();
</script>
</body>
</html>
