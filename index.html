<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SIAO — Prise de rendez-vous</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root[data-theme="dark"]{
  --bg:#07111f;--bg2:#0d1e30;--bg3:#132840;
  --blue:#1a6bdb;--blueL:#3b82f6;--accent:#38bdf8;
  --green:#10b981;--orange:#f59e0b;--red:#ef4444;--purple:#8b5cf6;
  --white:#e8f4ff;--gray:#64748b;--grayL:#94a3b8;--border:#1a3550;
  --card-bg:rgba(13,30,48,.92);
}
:root[data-theme="light"]{
  --bg:#f1f5f9;--bg2:#ffffff;--bg3:#e2e8f0;
  --blue:#1a6bdb;--blueL:#3b82f6;--accent:#0ea5e9;
  --green:#10b981;--orange:#f59e0b;--red:#ef4444;--purple:#8b5cf6;
  --white:#0f172a;--gray:#475569;--grayL:#64748b;--border:#cbd5e1;
  --card-bg:rgba(255,255,255,.95);
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden;transition:background .3s, color .3s}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
.screen{display:none;min-height:100vh}.screen.active{display:flex}

/* LOGIN */
#s-login{align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
#s-login::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0,rgba(26,107,219,.2),transparent);pointer-events:none}
.login-card{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:400px;position:relative;backdrop-filter:blur(10px)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .tag{color:var(--accent);font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase}
.login-logo h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-top:6px}
.login-logo p{color:var(--grayL);font-size:12px;margin-top:6px}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:3px;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:22px}
.tab{background:transparent;border:none;border-radius:8px;padding:9px;color:var(--gray);font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
.tab.active{background:var(--bg3);color:var(--accent)}
.field{margin-bottom:13px;position:relative}
.field label{display:block;color:var(--grayL);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--white);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--blueL)}
.field select option{background:var(--bg2)}
.pwd-toggle{position:absolute;right:12px;bottom:10px;background:none;border:none;color:var(--gray);cursor:pointer;font-size:14px;padding:0}
.pwd-toggle:hover{color:var(--accent)}
.btn-main{width:100%;background:var(--blue);color:#fff;border:none;border-radius:11px;padding:12px;font-size:14px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-main:hover{background:var(--blueL);transform:translateY(-1px)}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:9px 13px;color:#fca5a5;font-size:12px;margin-bottom:12px;display:none}
.err.show{display:block}
.loading-bar{text-align:center;color:var(--grayL);font-size:13px;padding:12px;display:none}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* LAYOUT */
#s-admin,#s-struct{flex-direction:row;width:100%}
.sidebar{width:240px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;bottom:0;left:0;z-index:50;overflow-y:auto;transition:transform .25s}
.main{margin-left:240px;flex:1;padding:28px 32px;min-height:100vh}
.sb-logo{padding:20px 18px;border-bottom:1px solid var(--border)}
.sb-logo .tag{color:var(--accent);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-family:'Syne',sans-serif}
.sb-logo .org{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-top:4px}
.sb-logo .sub{color:var(--gray);font-size:10px;margin-top:2px}
.sb-nav{flex:1;padding:12px 8px}
.sb-sec{color:var(--gray);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:12px 10px 4px}
.sb-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border-radius:9px;border:none;background:transparent;color:var(--gray);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;margin-bottom:2px;text-align:left;transition:all .15s}
.sb-btn:hover{background:var(--bg3);color:var(--grayL)}
.sb-btn.active{background:rgba(26,107,219,.15);color:var(--accent);font-weight:600}
.sb-foot{padding:12px 16px;border-top:1px solid var(--border)}
.sb-foot .who{color:var(--grayL);font-size:12px;font-weight:600}
.sb-foot .lbl{color:var(--gray);font-size:10px}
.realtime-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.logout{width:100%;background:transparent;border:1px solid var(--border);border-radius:7px;padding:7px;color:var(--gray);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;transition:all .2s}
.logout:hover{border-color:var(--red);color:#fca5a5}
.theme-toggle{position:fixed;top:12px;right:12px;z-index:101;background:var(--bg2);border:1px solid var(--border);border-radius:30px;padding:6px 12px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:6px;transition:all .2s}
.theme-toggle:hover{background:var(--bg3)}

/* MOBILE MENU */
.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:100;background:var(--bg2);border:1px solid var(--border);border-radius:9px;width:38px;height:38px;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}

/* BOTTOM NAV MOBILE */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:8px 16px;justify-content:space-around;z-index:50}
.bottom-nav .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--gray);font-size:10px;cursor:pointer;padding:6px 12px;border-radius:8px}
.bottom-nav .nav-item.active{color:var(--accent);background:rgba(26,107,219,.1)}
.bottom-nav .nav-item span:first-child{font-size:18px}

/* INACTIVITY */
#inactivity-warn{display:none;position:fixed;top:0;left:0;right:0;background:rgba(245,158,11,.15);border-bottom:1px solid rgba(245,158,11,.3);padding:10px 20px;text-align:center;font-size:12px;color:var(--orange);z-index:300;font-weight:600}
#inactivity-warn.show{display:block}

/* TABS */
.tp{display:none}.tp.active{display:block}
.ph{margin-bottom:24px}
.ph h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800}
.ph p{color:var(--gray);font-size:12px;margin-top:3px}
.ph-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:6px 12px;margin-bottom:16px}
.search-bar input{flex:1;background:transparent;border:none;padding:6px;color:var(--white);outline:none}
.search-bar span{color:var(--gray)}

/* COMPOSANTS */
.btn{border:none;border-radius:9px;padding:8px 16px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-p{background:var(--blue);color:#fff}
.btn-g{background:var(--bg3);color:var(--grayL);border:1px solid var(--border)}
.btn-s{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.4)}
.btn-s:hover{background:rgba(16,185,129,.25)}
.btn-d{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.btn-o{background:rgba(245,158,11,.15);color:var(--orange);border:1px solid rgba(245,158,11,.4)}
.btn-o:hover{background:rgba(245,158,11,.25)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:18px;transition:transform .2s, box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.badge{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;display:inline-block}
.b-blue{background:rgba(56,189,248,.1);color:var(--accent)}
.b-green{background:rgba(16,185,129,.1);color:var(--green)}
.b-orange{background:rgba(245,158,11,.1);color:var(--orange)}
.b-red{background:rgba(239,68,68,.1);color:#fca5a5}
.b-gray{background:rgba(100,116,139,.1);color:var(--grayL)}
.b-purple{background:rgba(139,92,246,.1);color:var(--purple)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;border-top:2px solid var(--c,var(--blue));transition:transform .2s}
.stat:hover{transform:translateY(-2px)}
.stat-v{font-family:'DM Mono',monospace;font-size:26px;color:var(--white);margin-bottom:3px}
.stat-l{color:var(--gray);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

/* CRÉNEAUX */
.cr-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px;border-left:3px solid var(--c,var(--blue));transition:all .2s;animation:fadeIn .3s ease}
.cr-card:hover{transform:translateX(2px);box-shadow:0 2px 12px rgba(0,0,0,.3)}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.cr-date{text-align:center;min-width:46px}
.cr-day{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1}
.cr-mon{font-size:10px;font-weight:600;text-transform:uppercase;color:var(--gray);letter-spacing:.06em}
.cr-info h3{font-size:13px;font-weight:600;margin-bottom:3px}
.cr-meta{display:flex;flex-wrap:wrap;gap:6px}
.cr-meta span{font-size:11px;color:var(--grayL)}
.cr-act{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap}

/* FORM */
.fg{margin-bottom:12px}
.fg label{display:block;color:var(--grayL);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--white);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blueL)}
.fg select option{background:var(--bg2)}
.fg-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:16px}
.ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:500px;max-height:86vh;overflow-y:auto;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.mh{padding:18px 20px 0;display:flex;justify-content:space-between;align-items:center}
.mh h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:800}
.mb{padding:16px 20px 20px}
.cls{background:var(--bg3);border:none;border-radius:7px;width:28px;height:28px;cursor:pointer;color:var(--gray);font-size:14px;display:flex;align-items:center;justify-content:center}
.cls:hover{color:var(--white)}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--green);border-radius:10px;padding:10px 18px;color:var(--green);font-size:12px;font-weight:600;z-index:999;opacity:0;transform:translateY(6px);transition:all .25s;pointer-events:none;max-width:280px}
#toast.show{opacity:1;transform:translateY(0)}
#toast.error{border-color:var(--red);color:#fca5a5}
#toast.warning{border-color:var(--orange);color:var(--orange)}

/* TOUR GUIDE */
.tour-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:none;justify-content:center;align-items:center}
.tour-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:320px;text-align:center}
.tour-card h3{margin-bottom:12px}
.tour-card p{margin-bottom:16px;color:var(--grayL)}
.tour-card .btn{margin:4px}

/* STRUCTURE VIEW */
.hero{background:linear-gradient(135deg,rgba(26,107,219,.15),rgba(14,165,233,.08));border:1px solid rgba(56,189,248,.15);border-radius:14px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
.av{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--accent));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.rdv-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;border-left:3px solid var(--c,var(--purple));transition:all .2s}
.rdv-item:hover{transform:translateX(2px)}
.rdv-db{text-align:center;min-width:42px;flex-shrink:0}
.rdv-day{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;line-height:1}
.rdv-mon{font-size:9px;text-transform:uppercase;font-weight:700;color:var(--gray);letter-spacing:.06em}
.empty{text-align:center;padding:48px 20px;color:var(--gray)}
.empty .ei{font-size:40px;margin-bottom:12px;opacity:.35}
.empty p{font-size:13px}

/* TABLE */
.struct-tbl{width:100%;border-collapse:collapse}
.struct-tbl th{background:var(--bg3);color:var(--gray);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:9px 13px;text-align:left;border-bottom:1px solid var(--border)}
.struct-tbl td{padding:11px 13px;border-bottom:1px solid var(--border);font-size:12px;color:var(--grayL)}
.struct-tbl tr:hover td{background:rgba(26,107,219,.03)}
.struct-tbl tr:last-child td{border-bottom:none}
.link-chip{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);background:rgba(56,189,248,.06);padding:4px 9px;border-radius:5px;cursor:pointer;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block}
.link-chip:hover{background:rgba(56,189,248,.14)}

/* FILTRES */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;background:rgba(19,40,64,.4);padding:8px 12px;border-radius:12px}
.fb{background:var(--bg2);color:var(--gray);border:1px solid var(--border);border-radius:7px;padding:5px 12px;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s}
.fb.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* CALENDRIER */
.calendar-container{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:auto}
.calendar-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.calendar-week{display:grid;grid-template-columns:repeat(6,1fr);background:var(--bg3);min-width:600px}
.calendar-day-header{padding:10px;text-align:center;font-weight:600;border-right:1px solid var(--border)}
.calendar-day-header:first-child{background:var(--bg3)}
.calendar-body{min-width:600px}
.calendar-row{display:grid;grid-template-columns:repeat(6,1fr);border-bottom:1px solid var(--border)}
.calendar-slot{min-height:52px;padding:4px;border-right:1px solid var(--border);cursor:pointer;transition:background .2s}
.calendar-slot:hover{background:rgba(26,107,219,.1)}
.calendar-event{background:rgba(26,107,219,.2);border-left:2px solid var(--blue);border-radius:4px;padding:2px 4px;margin-bottom:2px;font-size:10px;cursor:pointer}
.time-slot{padding:4px 8px;font-size:10px;color:var(--gray);text-align:right}

/* GRAPHIQUE */
.chart-container{height:200px;margin-top:16px}
.drow{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.drow:last-child{border-bottom:none}
.drow-l{color:var(--gray);font-size:12px;min-width:140px;flex-shrink:0}
.drow-v{color:var(--white);font-size:12px}

/* PASSWORD */
.pwd-strength{height:4px;border-radius:2px;margin-top:6px;transition:all .3s;background:var(--border);width:0}
.pwd-strength.weak{background:var(--red);width:33%}
.pwd-strength.medium{background:var(--orange);width:66%}
.pwd-strength.strong{background:var(--green);width:100%}
.pwd-hint{font-size:10px;color:var(--gray);margin-top:4px}

/* TAGS */
.tag-container{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag-item{background:var(--bg3);border-radius:14px;padding:4px 10px;font-size:11px;display:inline-flex;align-items:center;gap:6px}
.tag-item .remove{color:var(--red);cursor:pointer;font-weight:bold;margin-left:4px}
.tag-item .remove:hover{color:#ff6b6b}
.add-tag{display:flex;gap:6px;margin-top:8px}
.add-tag input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--white);font-size:12px}
.add-tag button{padding:6px 12px}

/* WIDGET JOUR */
.today-widget{background:linear-gradient(135deg,var(--blue),var(--accent));border-radius:12px;padding:16px 20px;margin-bottom:20px;color:#fff}
.today-widget h3{margin-bottom:8px;font-family:'Syne',sans-serif}
.today-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.today-item{background:rgba(255,255,255,.2);border-radius:8px;padding:6px 12px;font-size:12px}

/* BREADCRUMBS */
.breadcrumbs{display:flex;gap:6px;margin-bottom:16px;font-size:11px;color:var(--gray)}
.breadcrumbs a{cursor:pointer;color:var(--accent);text-decoration:none}
.breadcrumbs a:hover{text-decoration:underline}

/* SWIPE MOBILE */
.swipe-area{position:relative}
.swipe-indicator{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:12px;opacity:0;transition:opacity .2s}
.rdv-item:active .swipe-indicator{opacity:.5}

/* RESPONSIVE */
@media(max-width:768px){
  .menu-toggle{display:flex}
  .sidebar{transform:translateX(-100%);width:260px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{margin-left:0;padding:16px;padding-top:60px;padding-bottom:70px}
  .stats{grid-template-columns:1fr 1fr}
  .cr-card{grid-template-columns:auto 1fr;gap:10px}
  .cr-act{grid-column:1/-1;justify-content:flex-end}
  .ph-row{flex-direction:column}
  .struct-tbl{display:block;overflow-x:auto}
  #s-login{padding:16px}
  .login-card{padding:28px 20px}
  .fg-row{grid-template-columns:1fr}
  .drow{flex-direction:column;gap:2px}
  .drow-l{min-width:unset;font-size:10px}
  .bottom-nav{display:flex}
  .theme-toggle{top:auto;bottom:70px;right:12px;background:var(--bg2);box-shadow:0 2px 8px rgba(0,0,0,.2)}
}
@media(max-width:480px){
  .stats{grid-template-columns:1fr}
  .ph h2{font-size:17px}
  .btn{padding:10px 14px}
